name: Weekly Update ETF Charts

on:
  push:
    branches: [ main ]
  schedule:
    # жҜҸйҖұдёҖеҮҢжҷЁ 2 й»һ (UTC)
    - cron: '0 2 * * 1'
  # е…ҒиЁұжүӢеӢ•и§ёзҷј
  workflow_dispatch:

jobs:
  generate-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei fonts-wqy-microhei fonts-noto-cjk fonts-noto-cjk-extra fonts-arphic-ukai fonts-arphic-uming fonts-ipafont-mincho fonts-ipafont-gothic fonts-unfonts-core


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rebuild font cache and matplotlib fonts
        run: |
          echo "рҹ”Ғ Rebuilding font cache and matplotlib font manager"
          sudo fc-cache -fv || true
          python -c "import matplotlib.font_manager as fm; fm._rebuild(); print('matplotlib font cache rebuilt')"

      - name: Generate Active ETF Charts
        run: |
          echo "рҹ“Ҡ з”ҹжҲҗдё»еӢ•ејҸETFең–иЎЁ..."
          python ETFEngine_main.py active_etf
        continue-on-error: true

      - name: Check Active ETF Outputs
        run: |
          echo "рҹ”Қ Checking Active ETF outputs..."
          ls -lah Output_Active_ETF/ || echo "No Output_Active_ETF folder"
          find Output_Active_ETF -name "*.png" | wc -l | xargs echo "PNG files:"
          find Output_Active_ETF -name "*.csv" | wc -l | xargs echo "CSV files:"
        continue-on-error: true

      - name: Generate High Dividend ETF Charts
        run: |
          echo "рҹ’° з”ҹжҲҗй«ҳиӮЎжҒҜETFең–иЎЁ..."
          python ETFEngine_main.py high_dividend_etf
        continue-on-error: true

      - name: Check High Dividend ETF Outputs
        run: |
          echo "рҹ”Қ Checking High Dividend ETF outputs..."
          ls -lah Output_HighDividend_ETF/ || echo "No Output_HighDividend_ETF folder"
          find Output_HighDividend_ETF -name "*.png" | wc -l | xargs echo "PNG files:"
          find Output_HighDividend_ETF -name "*.csv" | wc -l | xargs echo "CSV files:"
        continue-on-error: true

      - name: Generate Industry ETF Charts
        run: |
          echo "рҹҸӯ з”ҹжҲҗз”ўжҘӯеһӢETFең–иЎЁ..."
          python ETFEngine_main.py industry_etf
        continue-on-error: true

      - name: Check Industry ETF Outputs
        run: |
          echo "рҹ”Қ Checking Industry ETF outputs..."
          ls -lah Output_Industry_ETF/ || echo "No Output_Industry_ETF folder"
          find Output_Industry_ETF -name "*.png" | wc -l | xargs echo "PNG files:"
          find Output_Industry_ETF -name "*.csv" | wc -l | xargs echo "CSV files:"
        continue-on-error: true

      - name: Prepare outputs for deployment
        run: |
          echo "рҹ“Ұ жә–еӮҷијёеҮәж–Үд»¶..."
          mkdir -p charts_output
          
          # иӨҮиЈҪжүҖжңүз”ҹжҲҗзҡ„ең–иЎЁпјҲж–Үд»¶еҗҚе·ІеңЁ Python д»Јзўјдёӯж·»еҠ еүҚз¶ҙпјү
          cp -r Output_*_ETF/*.png charts_output/ 2>/dev/null || true
          cp -r Output_*_ETF/*.csv charts_output/ 2>/dev/null || true
          
          # еүөе»әжҷӮй–“жҲіиЁҳ
          echo "Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > charts_output/UPDATE_TIME.txt
          
          echo "вң… ијёеҮәж–Үд»¶е·Іжә–еӮҷ"
          ls -lah charts_output/

      - name: Commit and push changes
        run: |
          git config --global user.name "ETF Bot"
          git config --global user.email "etf-bot@github.com"
          
          # ж·»еҠ жӣҙж–°зҡ„ең–иЎЁ
          git add charts_output/ 2>/dev/null || true
          
          # жӘўжҹҘжҳҜеҗҰжңүи®ҠеҢ–
          if git diff --cached --quiet; then
            echo "вҸӯпёҸ  жІ’жңүж–°зҡ„и®ҠеҢ–пјҢи·ійҒҺжҸҗдәӨ"
          else
            git commit -m "chore: weekly ETF charts update - $(date -u +'%Y-%m-%d')"
            git push origin main
            echo "вң… ең–иЎЁе·ІжҺЁйҖҒеҲ°дё»еҲҶж”Ҝ"
          fi
        continue-on-error: true

      - name: Trigger Render deployment
        if: success()
        run: |
          echo "рҹҡҖ и§ёзҷј Render йғЁзҪІ..."
          
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "вҡ пёҸ  RENDER_DEPLOY_HOOK жңӘй…ҚзҪ®пјҢи·ійҒҺиҮӘеӢ•йғЁзҪІ"
            echo "и«ӢеңЁ GitHub Secrets дёӯиЁӯзҪ® RENDER_DEPLOY_HOOK"
          else
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
              -H "Content-Type: application/json" \
              -d '{"commit_message":"Weekly ETF charts update"}' \
              --fail || echo "вҡ пёҸ  Render йғЁзҪІйҖҡзҹҘеӨұж•—пјҲе№«жҲ‘зңӢзҸҫеңЁupdate-charts.ymlзҡ„еҜ«жі•пјҢcommitдёҠеҺ»зӮәд»ҖйәјжІ’жңүзӣҙжҺҘи§ёзҷјaction пјҢжҲ‘еёҢжңӣиғҪи·‘еҮәдё»еӢ•ејҸгҖҒй«ҳиӮЎжҒҜгҖҒе’Ңз”ўжҘӯеһӢдёүеҖӢoutput folderиЈЎйқўзҡ„ең–иЎЁеҸҜиғҪе·ІжүӢеӢ•и§ёзҷјпјү"
            echo "вң… Render йғЁзҪІе·Іи§ёзҷј"
          fi
        continue-on-error: true

      - name: Generate summary
        if: always()
        run: |
          echo "рҹ“Ӣ ETF ең–иЎЁжӣҙж–°зёҪзөҗ"
          echo "=================="
          echo "жӣҙж–°жҷӮй–“: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "з”ҹжҲҗзҡ„ең–иЎЁпјҡ"
          find Output_*_ETF -name "*.png" 2>/dev/null | wc -l | xargs echo "  PNG ең–иЎЁж•ё:"
          find Output_*_ETF -name "*.csv" 2>/dev/null | wc -l | xargs echo "  CSV ж–Үд»¶ж•ё:"
          echo ""
          echo "ијёеҮәдҪҚзҪ®: charts_output/"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-charts-${{ github.run_id }}
          path: |
            charts_output/
            Output_*_ETF/
          retention-days: 30

  notify:
    needs: generate-and-update
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Create completion status
        run: |
          if [ "${{ needs.generate-and-update.result }}" = "success" ]; then
            echo "вң… ETF ең–иЎЁжӣҙж–°жҲҗеҠҹе®ҢжҲҗ"
          else
            echo "вҡ пёҸ  ETF ең–иЎЁжӣҙж–°е®ҢжҲҗпјҢдҪҶжҹҗдәӣжӯҘй©ҹеҸҜиғҪеӨұж•—"
          fi
